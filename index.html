<script>
// ── window.storage köprüsü: React tarafı bunu çağırır, gerçek iş modül script'inde
//    Firebase/Firestore üzerinden yapılır. Firebase hazır olana kadar çağrılar bekler. ──
window.__firebaseReady = new Promise((resolve) => { window.__resolveFirebaseReady = resolve; });
window.__firebaseError = null;

window.storage = {
  async get(key, shared) {
    await window.__firebaseReady;
    if (window.__firebaseError) throw window.__firebaseError;
    try { return await window.__fsOps.get(key); }
    catch (e) { console.error("storage.get hata:", e); return null; }
  },
  async set(key, value, shared) {
    await window.__firebaseReady;
    if (window.__firebaseError) throw window.__firebaseError;
    return await window.__fsOps.set(key, value);
  },
  async delete(key, shared) {
    await window.__firebaseReady;
    if (window.__firebaseError) throw window.__firebaseError;
    return await window.__fsOps.delete(key);
  },
  async list(prefix, shared) {
    await window.__firebaseReady;
    if (window.__firebaseError) throw window.__firebaseError;
    try { return await window.__fsOps.list(prefix); }
    catch (e) { console.error("storage.list hata:", e); return { keys: [] }; }
  },
};
</script>

<script type="module">
// ── Firebase kurulumu — sadece tek seferlik oku/yaz (realtime dinleyici YOK),
//    bu yüzden ücretsiz kotayı asla zorlamaz. Dinamik import + try/catch/finally
//    ve bir zaman aşımı kullanılıyor: Firebase hiçbir sebeple yüklenemezse bile
//    "Bağlanılıyor…" ekranı sonsuza dek takılı kalmaz, arayüz açılır. ──
const FB_VERSION = "10.13.2";
const firebaseConfig = {
  apiKey: "AIzaSyA6Xsvn0FJHjeiQHFEwkcAA2EaeCx-wlOU",
  authDomain: "yangin-tupu-kontrol.firebaseapp.com",
  projectId: "yangin-tupu-kontrol",
  storageBucket: "yangin-tupu-kontrol.firebasestorage.app",
  messagingSenderId: "831678308096",
  appId: "1:831678308096:web:7ffaa7e2b432889da4dde5",
};
const COL = "app_data";

function finishUp() {
  const el = document.getElementById("fb-status");
  if (el) el.classList.add("hidden");
  if (window.__resolveFirebaseReady) { window.__resolveFirebaseReady(); window.__resolveFirebaseReady = null; }
}

// 8 saniye içinde bir sonuç çıkmazsa (yavaş ağ, engellenen istek vb.) zorla devam et.
const hardTimeout = setTimeout(() => {
  if (!window.__fsOps) {
    console.warn("Firebase zaman aşımına uğradı, çevrimdışı modda devam ediliyor.");
    window.__firebaseError = window.__firebaseError || new Error("Firebase zaman aşımı");
  }
  finishUp();
}, 8000);

(async () => {
  try {
    const [{ initializeApp }, { getAuth, signInAnonymously, onAuthStateChanged }, fs] = await Promise.all([
      import(`https://www.gstatic.com/firebasejs/${FB_VERSION}/firebase-app.js`),
      import(`https://www.gstatic.com/firebasejs/${FB_VERSION}/firebase-auth.js`),
      import(`https://www.gstatic.com/firebasejs/${FB_VERSION}/firebase-firestore.js`),
    ]);
    const {
      getFirestore, doc, getDoc, setDoc, deleteDoc,
      collection, query, where, documentId, getDocs, serverTimestamp,
    } = fs;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    await new Promise((resolve, reject) => {
      const unsub = onAuthStateChanged(auth, (user) => {
        if (user) { unsub(); resolve(); }
      }, reject);
      signInAnonymously(auth).catch(reject);
    });

    window.__fsOps = {
      async get(key) {
        const snap = await getDoc(doc(db, COL, key));
        if (!snap.exists()) return null;
        return { key, value: snap.data().value };
      },
      async set(key, value) {
        await setDoc(doc(db, COL, key), { value, updatedAt: serverTimestamp() });
        return { key, value };
      },
      async delete(key) {
        await deleteDoc(doc(db, COL, key));
        return { key, deleted: true };
      },
      async list(prefix) {
        const colRef = collection(db, COL);
        const q = prefix
          ? query(colRef, where(documentId(), ">=", prefix), where(documentId(), "<", prefix + "\uf8ff"))
          : query(colRef);
        const snaps = await getDocs(q);
        const keys = [];
        snaps.forEach((d) => keys.push(d.id));
        return { keys };
      },
    };
  } catch (e) {
    console.error("Firebase başlatma hatası:", e);
    window.__firebaseError = e;
  } finally {
    clearTimeout(hardTimeout);
    finishUp();
  }
})();
</script>

const AYLAR = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const AY_INDEX = { OCAK:0, ŞUBAT:1, SUBAT:1, MART:2, NİSAN:3, NISAN:3, MAYIS:4, HAZİRAN:5, HAZIRAN:5, TEMMUZ:6, AĞUSTOS:7, AGUSTOS:7, EYLÜL:8, EYLUL:8, EKİM:9, EKIM:9, KASIM:10, ARALIK:11 };

const monthKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
const monthLabel = (key) => { const [y, m] = key.split("-"); return `${AYLAR[+m - 1]} ${y}`; };
const shiftMonth = (key, delta) => { const [y, m] = key.split("-").map(Number); return monthKey(new Date(y, m - 1 + delta, 1)); };

function sktDurum(skt) {
  if (!skt) return null;
  const parts = skt.trim().toUpperCase().split(/\s+/);
  const mi = AY_INDEX[parts[0]]; const yil = parseInt(parts[1]);
  if (mi === undefined || isNaN(yil)) return null;
  const now = new Date();
  const diff = (yil - now.getFullYear()) * 12 + (mi - now.getMonth());
  if (diff < 0) return "gecmis";
  if (diff <= 3) return "yaklasiyor";
  return null;
}

const CHECK_PREFIX = "yangintup:kontrol:";
const TUPLER_KEY = "yangintup:tup-listesi";

function YanginTupuKontrol() {
  const [tupler, setTupler] = useState([]);         // canlı tüp listesi (düzenlenebilir)
  const [checks, setChecks] = useState({});
  const [loading, setLoading] = useState(true);
  const [aktifAy, setAktifAy] = useState(monthKey(new Date()));
  const [filtre, setFiltre] = useState("hepsi");
  const [arama, setArama] = useState("");
  const [seciliNo, setSeciliNo] = useState(null);
  const [yeniTupAcik, setYeniTupAcik] = useState(false);
  const [kaydediliyor, setKaydediliyor] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const listeRes = await window.storage.get(TUPLER_KEY);
        if (listeRes?.value) {
          setTupler(JSON.parse(listeRes.value));
        } else {
          setTupler(VARSAYILAN_TUPLER);
          await window.storage.set(TUPLER_KEY, JSON.stringify(VARSAYILAN_TUPLER));
        }
      } catch (e) {
        setTupler(VARSAYILAN_TUPLER);
      }
      try {
        const res = await window.storage.list(CHECK_PREFIX);
        const keys = res?.keys || [];
        const yuklenen = {};
        for (const k of keys) {
          try {
            const r = await window.storage.get(k);
            if (r?.value) yuklenen[k.slice(CHECK_PREFIX.length)] = JSON.parse(r.value);
          } catch (e) { /* anahtar okunamadı */ }
        }
        setChecks(yuklenen);
      } catch (e) { /* hiç kayıt yok */ }
      setLoading(false);
    })();
  }, []);

  async function tupListesiKaydet(yeniListe) {
    setTupler(yeniListe);
    try {
      await window.storage.set(TUPLER_KEY, JSON.stringify(yeniListe));
    } catch (e) {
      alert("Tüp listesi kaydedilirken bir hata oluştu, lütfen tekrar deneyin.");
    }
  }

  async function tupGuncelle(no, alanlar) {
    const yeni = tupler.map((t) => (t.no === no ? { ...t, ...alanlar } : t));
    await tupListesiKaydet(yeni);
  }

  async function tupEkle(yeniTup) {
    const maxNo = tupler.reduce((m, t) => Math.max(m, t.no), 0);
    const kayit = { ...yeniTup, no: maxNo + 1 };
    await tupListesiKaydet([...tupler, kayit]);
    return kayit.no;
  }

  async function tupSil(no) {
    await tupListesiKaydet(tupler.filter((t) => t.no !== no));
    const yeniChecks = {};
    for (const ay of Object.keys(checks)) {
      const ayVerisi = { ...checks[ay] };
      if (ayVerisi[no]) {
        delete ayVerisi[no];
        try { await window.storage.set(CHECK_PREFIX + ay, JSON.stringify(ayVerisi)); } catch (e) {}
      }
      yeniChecks[ay] = ayVerisi;
    }
    setChecks(yeniChecks);
  }

  const ayVerisi = checks[aktifAy] || {};
  const durumOf = (no) => (ayVerisi[no] ? ayVerisi[no].durum : "bekliyor");

  const sayilar = useMemo(() => {
    let ok = 0, sorun = 0;
    for (const t of tupler) {
      const d = durumOf(t.no);
      if (d === "ok") ok++; else if (d === "sorun") sorun++;
    }
    return { ok, sorun, bekliyor: tupler.length - ok - sorun, toplam: tupler.length };
  }, [ayVerisi, tupler]);

  const gorunen = useMemo(() => {
    const q = arama.trim().toLocaleLowerCase("tr");
    return tupler.filter((t) => {
      const d = durumOf(t.no);
      if (filtre === "ok" && d !== "ok") return false;
      if (filtre === "sorun" && d !== "sorun") return false;
      if (filtre === "bekliyor" && d !== "bekliyor") return false;
      if (q && !`${t.no} ${t.yer || ""} ${t.cins || ""}`.toLocaleLowerCase("tr").includes(q)) return false;
      return true;
    }).sort((a, b) => a.no - b.no);
  }, [filtre, arama, ayVerisi, tupler]);

  async function kaydet(no, kayit) {
    setKaydediliyor(true);
    const yeniAy = { ...(checks[aktifAy] || {}) };
    if (kayit === null) delete yeniAy[no]; else yeniAy[no] = kayit;
    setChecks({ ...checks, [aktifAy]: yeniAy });
    try {
      await window.storage.set(CHECK_PREFIX + aktifAy, JSON.stringify(yeniAy));
    } catch (e) {
      alert("Kayıt sırasında bir hata oluştu, lütfen tekrar deneyin.");
    }
    setKaydediliyor(false);
  }

  const seciliTup = seciliNo ? tupler.find((t) => t.no === seciliNo) : null;
  const yuzde = sayilar.toplam ? Math.round(((sayilar.ok + sayilar.sorun) / sayilar.toplam) * 100) : 0;

  return (
    <div className="app">
      <style>{CSS}</style>
      <div className="blob b1" /><div className="blob b2" /><div className="blob b3" />

      <header className="topBar">
        <div className="topInner">
          <div className="titleRow">
            <div>
              <div className="eyebrow">FR.43.17 · Aylık Kontrol</div>
              <h1 className="title">Yangın Tüpleri</h1>
            </div>
            <div className="monthPicker">
              <button className="mBtn" onClick={() => setAktifAy(shiftMonth(aktifAy, -1))} aria-label="Önceki ay">‹</button>
              <span className="mLabel">{monthLabel(aktifAy)}</span>
              <button className="mBtn" onClick={() => setAktifAy(shiftMonth(aktifAy, 1))} aria-label="Sonraki ay">›</button>
            </div>
          </div>

          <div className="statRow">
            <div className="ring" style={{ "--p": yuzde }}><span>{yuzde}%</span></div>
            <div className="statText">
              <div className="statBig">{sayilar.ok + sayilar.sorun} <span className="statDim">/ {sayilar.toplam} tüp kontrol edildi</span></div>
              <div className="statSub">
                <span className="dot ok" /> {sayilar.ok} uygun&nbsp;&nbsp;
                <span className="dot sorun" /> {sayilar.sorun} sorunlu&nbsp;&nbsp;
                <span className="dot bekliyor" /> {sayilar.bekliyor} bekliyor
              </div>
            </div>
            <button className="addBtn" onClick={() => setYeniTupAcik(true)}>
              <span className="addPlus">+</span><span className="addTxt">Yeni tüp</span>
            </button>
          </div>

          <div className="controls">
            <div className="segment">
              {[["hepsi","Tümü"],["bekliyor","Bekliyor"],["ok","Uygun"],["sorun","Sorunlu"]].map(([k,l]) => (
                <button key={k} className={`seg ${filtre===k?"segOn":""} seg-${k}`} onClick={() => setFiltre(k)}>{l}</button>
              ))}
            </div>
            <input className="search" placeholder="Ara — no veya yer" value={arama} onChange={(e)=>setArama(e.target.value)} />
          </div>
        </div>
      </header>

      <main className="grid">
        {loading ? (
          <div className="empty">Kayıtlar yükleniyor…</div>
        ) : gorunen.length === 0 ? (
          <div className="empty">Bu filtreye uyan tüp yok.</div>
        ) : gorunen.map((t) => {
          const d = durumOf(t.no);
          const skt = sktDurum(t.skt);
          return (
            <button key={t.no} className={`card ${d}`} onClick={() => setSeciliNo(t.no)}>
              <div className={`badge ${d}`}>{t.no}</div>
              <div className="cardBody">
                <div className="cardLoc">{t.yer || "—"}</div>
                <div className="cardMeta">
                  <span>{t.cins || "Cinsi belirtilmemiş"}</span>
                  {skt === "gecmis" && <span className="pill pillRed">SKT geçmiş</span>}
                  {skt === "yaklasiyor" && <span className="pill pillAmber">SKT yakın</span>}
                </div>
              </div>
              <div className={`mark ${d}`}>{d === "ok" ? "✓" : d === "sorun" ? "!" : "›"}</div>
            </button>
          );
        })}
      </main>

      {seciliTup && (
        <TupModal
          tup={seciliTup} ay={aktifAy}
          mevcut={ayVerisi[seciliTup.no] || null}
          gecmis={checks} kaydediliyor={kaydediliyor}
          onKaydet={(kayit) => kaydet(seciliTup.no, kayit)}
          onGuncelle={(alanlar) => tupGuncelle(seciliTup.no, alanlar)}
          onSil={() => { tupSil(seciliTup.no); setSeciliNo(null); }}
          onKapat={() => setSeciliNo(null)}
        />
      )}

      {yeniTupAcik && (
        <YeniTupModal
          onEkle={async (veri) => { const no = await tupEkle(veri); setYeniTupAcik(false); setSeciliNo(no); }}
          onKapat={() => setYeniTupAcik(false)}
        />
      )}
    </div>
  );
}

function TupModal({ tup, ay, mevcut, gecmis, kaydediliyor, onKaydet, onGuncelle, onSil, onKapat }) {
  const { no, yer, cins, dolum, skt } = tup;
  const init = () => {
    const base = {};
    for (const k of KONTROL_KALEMLERI) base[k.key] = mevcut?.items?.[k.key] ?? true;
    return base;
  };
  const [items, setItems] = useState(init);
  const [digerSorun, setDigerSorun] = useState(mevcut?.digerSorun ?? false);
  const [not, setNot] = useState(mevcut?.not ?? "");
  const [duzenleAcik, setDuzenleAcik] = useState(false);
  const [taslak, setTaslak] = useState({ yer: yer || "", cins: cins || "", dolum: dolum || "", skt: skt || "" });
  const [silOnay, setSilOnay] = useState(false);

  useEffect(() => {
    setItems(init()); setDigerSorun(mevcut?.digerSorun ?? false); setNot(mevcut?.not ?? "");
    setTaslak({ yer: yer || "", cins: cins || "", dolum: dolum || "", skt: skt || "" });
    setDuzenleAcik(false); setSilOnay(false);
  }, [no, ay]);

  const sorunVar = digerSorun || KONTROL_KALEMLERI.some((k) => items[k.key] === false);
  const sktD = sktDurum(skt);

  function kaydetTikla() {
    onKaydet({ durum: sorunVar ? "sorun" : "ok", items, digerSorun, not: not.trim(), tarih: new Date().toISOString() });
    onKapat();
  }

  function duzenlemeKaydet() {
    onGuncelle({
      yer: taslak.yer.trim(),
      cins: taslak.cins.trim() || null,
      dolum: taslak.dolum.trim() || null,
      skt: taslak.skt.trim() || null,
    });
    setDuzenleAcik(false);
  }

  const gecmisKayitlar = Object.keys(gecmis).filter((m) => gecmis[m]?.[no]).sort().reverse();

  return (
    <div className="overlay" onClick={onKapat}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="grabber" />

        {!duzenleAcik ? (
          <>
            <div className="sheetHead">
              <div className={`badge big ${mevcut ? mevcut.durum : "bekliyor"}`}>{no}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="sheetLoc">{yer || "—"}</div>
                <div className="sheetType">{cins || "Cinsi belirtilmemiş"}</div>
              </div>
              <button className="iconBtn" onClick={() => setDuzenleAcik(true)} aria-label="Düzenle" title="Düzenle">✎</button>
              <button className="closeBtn" onClick={onKapat} aria-label="Kapat">✕</button>
            </div>

            <div className="infoRow">
              <div className="infoBox"><span className="infoLbl">Dolum</span><span className="infoVal">{dolum || "—"}</span></div>
              <div className="infoBox">
                <span className="infoLbl">Son kullanma</span>
                <span className="infoVal" style={{ color: sktD === "gecmis" ? "var(--red)" : sktD === "yaklasiyor" ? "var(--amber)" : undefined }}>
                  {skt || "—"}
                </span>
              </div>
            </div>
            {sktD === "gecmis" && <div className="warnBand">Son kullanma tarihi geçmiş — dolum / değişim planlanmalı.</div>}

            <div className="secTitle">{monthLabel(ay)} kontrolü</div>
            <div className="checkGroup">
              {KONTROL_KALEMLERI.map((k) => (
                <div key={k.key} className="checkRow">
                  <span className="checkLbl">{k.label}</span>
                  <div className="miniSeg">
                    <button className={`ms ${items[k.key] ? "msOk" : ""}`} onClick={() => setItems({ ...items, [k.key]: true })}>Uygun</button>
                    <button className={`ms ${!items[k.key] ? "msBad" : ""}`} onClick={() => setItems({ ...items, [k.key]: false })}>Sorunlu</button>
                  </div>
                </div>
              ))}
              <div className="checkRow">
                <span className="checkLbl">Başka bir sorun var</span>
                <div className="miniSeg">
                  <button className={`ms ${!digerSorun ? "msOk" : ""}`} onClick={() => setDigerSorun(false)}>Hayır</button>
                  <button className={`ms ${digerSorun ? "msBad" : ""}`} onClick={() => setDigerSorun(true)}>Evet</button>
                </div>
              </div>
            </div>

            <textarea className="note" rows={2} placeholder="Not (isteğe bağlı) — ör. manometre iğnesi kırmızıda…" value={not} onChange={(e) => setNot(e.target.value)} />

            <div className="btnRow">
              <button className={`saveBtn ${sorunVar ? "saveBad" : "saveOk"}`} onClick={kaydetTikla} disabled={kaydediliyor}>
                {kaydediliyor ? "Kaydediliyor…" : sorunVar ? "Sorunlu olarak kaydet" : "Kontrol edildi olarak kaydet"}
              </button>
              {mevcut && (
                <button className="delBtn" onClick={() => { onKaydet(null); onKapat(); }} disabled={kaydediliyor}>Ay kaydını sil</button>
              )}
            </div>

            <div className="secTitle">Geçmiş kontroller</div>
            {gecmisKayitlar.length === 0 ? (
              <div className="histEmpty">Bu tüp için henüz kayıtlı kontrol yok.</div>
            ) : (
              <div className="histList">
                {gecmisKayitlar.map((m) => {
                  const k = gecmis[m][no];
                  const bozuk = KONTROL_KALEMLERI.filter((kk) => k.items?.[kk.key] === false).map((kk) => kk.label);
                  if (k.digerSorun) bozuk.push("Diğer sorun");
                  return (
                    <div key={m} className="histRow">
                      <span className={`dot ${k.durum}`} style={{ marginTop: 6 }} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div className="histMonth">
                          {monthLabel(m)}
                          <span className={k.durum === "ok" ? "histOk" : "histBad"}>{k.durum === "ok" ? "Sorun yok" : "Sorunlu"}</span>
                        </div>
                        {bozuk.length > 0 && <div className="histIssues">{bozuk.join(" · ")}</div>}
                        {k.not && <div className="histNote">"{k.not}"</div>}
                      </div>
                      <div className="histDate">{k.tarih ? new Date(k.tarih).toLocaleDateString("tr-TR") : ""}</div>
                    </div>
                  );
                })}
              </div>
            )}

            <div className="dangerZone">
              {!silOnay ? (
                <button className="ghostDanger" onClick={() => setSilOnay(true)}>Bu tüpü kalıcı olarak sil</button>
              ) : (
                <div className="confirmRow">
                  <span className="confirmTxt">Emin misin? Tüm geçmiş kayıtları da silinecek.</span>
                  <div className="confirmBtns">
                    <button className="confirmNo" onClick={() => setSilOnay(false)}>Vazgeç</button>
                    <button className="confirmYes" onClick={onSil}>Evet, sil</button>
                  </div>
                </div>
              )}
            </div>
          </>
        ) : (
          <>
            <div className="sheetHead">
              <div className="badge big bekliyor">{no}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="sheetLoc">Tüpü düzenle</div>
                <div className="sheetType">No: {no}</div>
              </div>
              <button className="closeBtn" onClick={() => setDuzenleAcik(false)} aria-label="Vazgeç">✕</button>
            </div>

            <div className="formGroup">
              <label className="formLbl">Bulunduğu yer</label>
              <input className="formInput" value={taslak.yer} onChange={(e) => setTaslak({ ...taslak, yer: e.target.value })} placeholder="Örn. ÜST KAT ORTA KOLON" />

              <label className="formLbl">Cinsi / kapasitesi</label>
              <input className="formInput" value={taslak.cins} onChange={(e) => setTaslak({ ...taslak, cins: e.target.value })} placeholder="Örn. 6 KG KURU TOZ" />

              <div className="formRow2">
                <div style={{ flex: 1 }}>
                  <label className="formLbl">Dolum tarihi</label>
                  <input className="formInput" value={taslak.dolum} onChange={(e) => setTaslak({ ...taslak, dolum: e.target.value })} placeholder="Örn. OCAK 2025" />
                </div>
                <div style={{ flex: 1 }}>
                  <label className="formLbl">Son kullanma</label>
                  <input className="formInput" value={taslak.skt} onChange={(e) => setTaslak({ ...taslak, skt: e.target.value })} placeholder="Örn. OCAK 2029" />
                </div>
              </div>
            </div>

            <div className="btnRow">
              <button className="saveBtn saveOk" onClick={duzenlemeKaydet} disabled={!taslak.yer.trim()}>Değişiklikleri kaydet</button>
              <button className="delBtn" onClick={() => setDuzenleAcik(false)}>Vazgeç</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function YeniTupModal({ onEkle, onKapat }) {
  const [taslak, setTaslak] = useState({ yer: "", cins: "", dolum: "", skt: "" });
  const [gonderiliyor, setGonderiliyor] = useState(false);

  async function eklemeYap() {
    if (!taslak.yer.trim()) return;
    setGonderiliyor(true);
    await onEkle({
      yer: taslak.yer.trim(),
      cins: taslak.cins.trim() || null,
      dolum: taslak.dolum.trim() || null,
      skt: taslak.skt.trim() || null,
    });
    setGonderiliyor(false);
  }

  return (
    <div className="overlay" onClick={onKapat}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="grabber" />
        <div className="sheetHead">
          <div className="badge big bekliyor">+</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="sheetLoc">Yeni tüp ekle</div>
            <div className="sheetType">Listeye yeni bir yangın tüpü kaydet</div>
          </div>
          <button className="closeBtn" onClick={onKapat} aria-label="Kapat">✕</button>
        </div>

        <div className="formGroup">
          <label className="formLbl">Bulunduğu yer *</label>
          <input className="formInput" autoFocus value={taslak.yer} onChange={(e) => setTaslak({ ...taslak, yer: e.target.value })} placeholder="Örn. YENİ DEPO GİRİŞİ" />

          <label className="formLbl">Cinsi / kapasitesi</label>
          <input className="formInput" value={taslak.cins} onChange={(e) => setTaslak({ ...taslak, cins: e.target.value })} placeholder="Örn. 6 KG KURU TOZ" />

          <div className="formRow2">
            <div style={{ flex: 1 }}>
              <label className="formLbl">Dolum tarihi</label>
              <input className="formInput" value={taslak.dolum} onChange={(e) => setTaslak({ ...taslak, dolum: e.target.value })} placeholder="Örn. TEMMUZ 2026" />
            </div>
            <div style={{ flex: 1 }}>
              <label className="formLbl">Son kullanma</label>
              <input className="formInput" value={taslak.skt} onChange={(e) => setTaslak({ ...taslak, skt: e.target.value })} placeholder="Örn. TEMMUZ 2030" />
            </div>
          </div>
        </div>

        <div className="btnRow">
          <button className="saveBtn saveOk" onClick={eklemeYap} disabled={!taslak.yer.trim() || gonderiliyor}>
            {gonderiliyor ? "Ekleniyor…" : "Tüpü listeye ekle"}
          </button>
        </div>
      </div>
    </div>
  );
}

  border-radius: var(--r-md);
  box-shadow: 0 2px 10px rgba(30,35,50,.06);
  transition: transform .15s ease, box-shadow .15s ease;
}
.card:hover { transform: translateY(-2px) scale(1.005); box-shadow: 0 8px 24px rgba(30,35,50,.12); }
.card:active { transform: scale(.985); }
.card:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
.card.sorun { background: rgba(255,235,233,.6); border-color: rgba(255,59,48,.25); }
.card.ok { border-color: rgba(52,199,89,.3); }

.badge {
  min-width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; font-weight: 700; letter-spacing: -.5px;
  background: rgba(120,120,128,.14); color: var(--ink);
}
.badge.ok { background: var(--green); color: #fff; box-shadow: 0 3px 10px rgba(52,199,89,.35); }
.badge.sorun { background: var(--red); color: #fff; box-shadow: 0 3px 10px rgba(255,59,48,.35); }
.badge.big { min-width: 54px; height: 54px; font-size: 24px; border-radius: 15px; }

.cardBody { flex: 1; min-width: 0; }
.cardLoc { font-weight: 600; font-size: 14.5px; letter-spacing: -.1px; line-height: 1.28; }
.cardMeta { display: flex; align-items: center; gap: 7px; margin-top: 3px; flex-wrap: wrap; font-size: 12px; color: var(--gray); font-weight: 500; }

.pill { font-size: 10.5px; font-weight: 700; padding: 2.5px 8px; border-radius: 999px; letter-spacing: .2px; }
.pillRed { background: rgba(255,59,48,.14); color: var(--red-deep); }
.pillAmber { background: rgba(255,159,10,.18); color: var(--amber); }

.mark { font-size: 17px; font-weight: 700; width: 22px; text-align: center; flex-shrink: 0; color: rgba(120,120,128,.5); }
.mark.ok { color: var(--green-deep); }
.mark.sorun { color: var(--red-deep); }

.overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(20,22,30,.35);
  -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn .18s ease;
}
@keyframes fadeIn { from { opacity: 0; } }

.sheet {
  width: 100%; max-width: 540px; max-height: 88vh; overflow-y: auto;
  background: var(--glass-strong);
  -webkit-backdrop-filter: saturate(180%) blur(28px); backdrop-filter: saturate(180%) blur(28px);
  border: 0.5px solid rgba(255,255,255,.8);
  border-radius: 24px; padding: 20px 20px 24px;
  box-shadow: 0 30px 80px rgba(10,15,30,.35);
  animation: popIn .22s cubic-bezier(.32,1.25,.5,1);
}
@keyframes popIn { from { opacity: 0; transform: scale(.94); } }
.grabber { display: none; }

.sheetHead { display: flex; align-items: center; gap: 12px; }
.sheetLoc { font-weight: 700; font-size: 17px; letter-spacing: -.2px; line-height: 1.22; }
.sheetType { font-size: 12.5px; color: var(--gray); font-weight: 500; margin-top: 2px; }
.closeBtn, .iconBtn {
  width: 32px; height: 32px; border: none; border-radius: 50%; cursor: pointer; flex-shrink: 0;
  background: rgba(120,120,128,.16); color: var(--gray); font-size: 13px; font-weight: 700;
}
.iconBtn { font-size: 15px; color: var(--blue); background: rgba(0,113,227,.12); }
.closeBtn:hover { background: rgba(120,120,128,.24); color: var(--ink); }
.iconBtn:hover { background: rgba(0,113,227,.2); }

.infoRow { display: flex; gap: 10px; margin-top: 16px; }
.infoBox {
  flex: 1; display: flex; flex-direction: column; gap: 2px;
  background: rgba(255,255,255,.55); border: 0.5px solid rgba(255,255,255,.7);
  border-radius: var(--r-sm); padding: 9px 13px;
}
.infoLbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--gray); }
.infoVal { font-weight: 700; font-size: 14px; }

.warnBand {
  margin-top: 10px; padding: 9px 13px; border-radius: var(--r-sm);
  background: rgba(255,59,48,.12); color: var(--red-deep);
  font-size: 13px; font-weight: 600; border: 0.5px solid rgba(255,59,48,.2);
}

.secTitle { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--gray); margin: 22px 0 9px; }

.checkGroup { display: flex; flex-direction: column; gap: 8px; }
.checkRow {
  display: flex; align-items: center; gap: 12px; padding: 13px 15px;
  font-size: 14px; background: rgba(255,255,255,.6);
  border: 0.5px solid rgba(255,255,255,.8);
  border-radius: var(--r-sm);
  box-shadow: 0 1px 3px rgba(30,35,50,.05);
  transition: box-shadow .15s, background .15s;
}
.checkRow:hover { background: rgba(255,255,255,.75); box-shadow: 0 3px 10px rgba(30,35,50,.08); }
.checkLbl { flex: 1; font-weight: 600; letter-spacing: -.1px; }

.miniSeg { display: flex; background: rgba(120,120,128,.14); border-radius: 10px; padding: 3px; gap: 3px; flex-shrink: 0; }
.ms {
  border: none; background: transparent; cursor: pointer; font-family: inherit;
  font-size: 12.5px; font-weight: 700; color: var(--gray);
  padding: 6px 13px; border-radius: 8px; transition: all .15s; letter-spacing: -.1px;
}
.ms:hover { color: var(--ink); }
.msOk { background: var(--green); color: #fff; box-shadow: 0 2px 6px rgba(52,199,89,.45); }
.msOk:hover { color: #fff; }
.msBad { background: var(--red); color: #fff; box-shadow: 0 2px 6px rgba(255,59,48,.45); }
.msBad:hover { color: #fff; }

.note {
  width: 100%; margin-top: 12px; padding: 11px 14px; font-family: inherit; font-size: 14px;
  border: 0.5px solid rgba(255,255,255,.7); border-radius: var(--r-sm);
  background: rgba(255,255,255,.55); color: var(--ink); resize: vertical; outline: none;
}
.note::placeholder { color: var(--gray); }
.note:focus { background: rgba(255,255,255,.85); box-shadow: 0 0 0 3px rgba(0,113,227,.22); }

.btnRow { display: flex; gap: 9px; margin-top: 14px; flex-wrap: wrap; }
.saveBtn {
  flex: 1; min-width: 190px; padding: 13px 18px; border: none; border-radius: 14px; cursor: pointer;
  font-family: inherit; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.1px;
  transition: transform .12s, filter .12s;
}
.saveBtn:active:not(:disabled) { transform: scale(.98); }
.saveBtn:disabled { opacity: .55; cursor: default; }
.saveOk { background: var(--green); box-shadow: 0 6px 18px rgba(52,199,89,.35); }
.saveOk:hover:not(:disabled) { filter: brightness(.95); }
.saveBad { background: var(--red); box-shadow: 0 6px 18px rgba(255,59,48,.35); }
.saveBad:hover:not(:disabled) { filter: brightness(.95); }

.delBtn {
  padding: 13px 16px; border-radius: 14px; cursor: pointer; font-family: inherit;
  font-size: 13.5px; font-weight: 600; color: var(--red-deep);
  background: rgba(255,59,48,.1); border: none;
}
.delBtn:hover:not(:disabled) { background: rgba(255,59,48,.16); }

.histEmpty { font-size: 13.5px; color: var(--gray); }
.histList { display: flex; flex-direction: column; gap: 4px; }
.histRow {
  display: flex; gap: 11px; align-items: flex-start; padding: 10px 13px;
  background: rgba(255,255,255,.5); border: 0.5px solid rgba(255,255,255,.65);
  border-radius: var(--r-sm);
}
.histMonth { font-weight: 600; font-size: 14px; }
.histOk { color: var(--green-deep); font-weight: 700; margin-left: 8px; font-size: 13px; }
.histBad { color: var(--red-deep); font-weight: 700; margin-left: 8px; font-size: 13px; }
.histIssues { font-size: 12.5px; color: var(--red-deep); margin-top: 2px; font-weight: 500; }
.histNote { font-size: 13px; color: var(--gray); margin-top: 2px; font-style: italic; }
.histDate { font-size: 11.5px; color: var(--gray); white-space: nowrap; padding-top: 3px; }

.formGroup { display: flex; flex-direction: column; margin-top: 16px; }
.formLbl {
  display: block; font-size: 12px; font-weight: 700; color: var(--gray);
  text-transform: uppercase; letter-spacing: .5px; margin: 14px 0 6px;
}
.formGroup > .formLbl:first-child { margin-top: 0; }
.formInput {
  display: block; width: 100%; min-width: 0; padding: 12px 14px;
  font-family: inherit; font-size: 15px; font-weight: 500;
  border: 0.5px solid rgba(255,255,255,.8); border-radius: var(--r-sm);
  background: rgba(255,255,255,.65); color: var(--ink); outline: none;
  box-shadow: 0 1px 3px rgba(30,35,50,.05);
  transition: background .15s, box-shadow .15s;
}
.formInput::placeholder { color: rgba(110,110,115,.65); font-weight: 400; }
.formInput:focus { background: rgba(255,255,255,.95); box-shadow: 0 0 0 3px rgba(0,113,227,.22); }
.formRow2 { display: flex; gap: 10px; align-items: flex-start; }
.formRow2 > div { min-width: 0; flex: 1; }

.dangerZone { margin-top: 22px; padding-top: 14px; border-top: 0.5px solid var(--hairline); }
.ghostDanger {
  background: none; border: none; cursor: pointer; font-family: inherit;
  font-size: 13px; font-weight: 600; color: var(--red-deep); opacity: .75; padding: 4px 0;
}
.ghostDanger:hover { opacity: 1; text-decoration: underline; }
.confirmRow { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.confirmTxt { font-size: 13px; color: var(--red-deep); font-weight: 600; flex: 1; }
.confirmBtns { display: flex; gap: 8px; }
.confirmNo, .confirmYes {
  border: none; border-radius: 9px; padding: 7px 13px; font-family: inherit;
  font-size: 12.5px; font-weight: 700; cursor: pointer;
}
.confirmNo { background: rgba(120,120,128,.15); color: var(--ink); }
.confirmYes { background: var(--red); color: #fff; }

@media (max-width: 640px) {
  .title { font-size: 22px; }
  .topInner { padding: 12px 14px 10px; }
  .grid { padding: 0 12px; gap: 9px; grid-template-columns: 1fr; margin-top: 14px; }
  .card { padding: 12px; }
  .statRow { gap: 10px; flex-wrap: wrap; }
  .ring { width: 48px; height: 48px; }
  .addBtn { padding: 9px 12px; }
  .addTxt { display: none; }
  .controls { gap: 8px; }
  .search { min-width: 100%; order: 2; }
  .segment { width: 100%; }
  .seg { flex: 1; padding: 7px 6px; font-size: 12.5px; }

  .overlay { align-items: flex-end; padding: 0; }
  .sheet {
    max-width: 100%; max-height: 92vh;
    border-radius: 24px 24px 0 0;
    padding: 10px 16px calc(24px + env(safe-area-inset-bottom));
    animation: slideUp .28s cubic-bezier(.32,1.15,.5,1);
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } }
  .grabber {
    display: block; width: 38px; height: 5px; border-radius: 3px;
    background: rgba(120,120,128,.3); margin: 0 auto 14px;
  }
  .checkRow { flex-wrap: wrap; }
  .miniSeg { margin-left: auto; }
  .saveBtn { min-width: 100%; }
  .delBtn { width: 100%; }
  .formRow2 { flex-direction: column; }
}

@media (prefers-reduced-motion: reduce) {
  .card, .seg, .ms, .saveBtn, .addBtn { transition: none; }
  .sheet, .overlay { animation: none; }
}
`;

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<YanginTupuKontrol />);
</script>
